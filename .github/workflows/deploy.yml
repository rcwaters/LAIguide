name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Prevent the deploy bot's own commit from re-triggering this workflow
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The deploy bot commits dist/index.html (with hashed asset refs) back to
      # main. Strip those out before building so vite always rebuilds from source.
      - name: Restore dev entry point in index.html
        run: |
          python3 - <<'EOF'
          import re
          with open('index.html') as f:
              content = f.read()
          # Remove any pre-built asset <script> and <link> tags the deploy bot injected
          content = re.sub(r'[ \t]*<script[^>]+crossorigin src="[^"]*assets/[^"]*"[^>]*></script>\n?', '', content)
          content = re.sub(r'[ \t]*<link[^>]+crossorigin href="[^"]*assets/[^"]*"[^>]*>\n?', '', content)
          # Ensure the vite dev entry point is present
          if '/src/main.ts' not in content:
              content = content.replace('</title>', '</title>\n  <script type="module" src="/src/main.ts"></script>', 1)
          with open('index.html', 'w') as f:
              f.write(content)
          EOF

      - name: Build
        run: npm run build

      # Deploy built dist/ back to main root so GitHub Pages (serving main/(root))
      # serves the compiled bundle instead of the raw TypeScript source.
      - name: Deploy to main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist/
          clean: false   # preserve source files (src/, package.json, etc.)

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Post-deploy smoke test (live URL)
        env:
          PLAYWRIGHT_BASE_URL: https://rcwaters.github.io/LAIguide
        run: npx playwright test e2e/deploy-smoke.spec.ts --project=chromium
