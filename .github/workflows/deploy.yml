name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write

# One deploy at a time. Each admin save makes two commits (saveMed + appendChangelog),
# which would otherwise trigger two parallel deploys that race and one fails.
# cancel-in-progress: false queues the second run so both changes land cleanly.
concurrency:
    group: deploy
    cancel-in-progress: false

jobs:
    deploy:
        name: Build & Deploy
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              env:
                  ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
              run: npm run build

            - name: Deploy to main
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: main
                  folder: dist/
                  clean: false
                  commit-message: 'Deploy built assets [skip ci]'

            - name: Wait for GitHub Pages to propagate
              run: |
                  echo "Polling for Pages propagation (up to 5 min)..."
                  for i in {1..30}; do
                    STATUS=$(curl -o /dev/null -s -w "%{http_code}" "https://darenceT.github.io/LAIguide/")
                    if [ "$STATUS" = "200" ]; then
                      echo "Pages responded 200 on attempt $i — sleeping 15s for cache flush"
                      sleep 15
                      break
                    fi
                    echo "Attempt $i: HTTP $STATUS, retrying in 10s..."
                    sleep 10
                  done

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: ./node_modules/.bin/playwright install chromium

            - name: Install Playwright system deps
              run: ./node_modules/.bin/playwright install-deps chromium

            - name: Post-deploy smoke test (live URL)
              continue-on-error: true
              env:
                  PLAYWRIGHT_BASE_URL: https://darenceT.github.io/LAIguide
              run: npx playwright test e2e/deploy-smoke.spec.ts --project=chromium
