name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Prevent the deploy bot's own commit from re-triggering this workflow
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Deploy built dist/ back to main root so GitHub Pages (serving main/(root))
      # serves the compiled bundle instead of the raw TypeScript source.
      - name: Deploy to main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist/
          clean: false   # preserve source files (src/, package.json, etc.)
