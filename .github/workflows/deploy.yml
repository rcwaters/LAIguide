name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write

# One deploy at a time. Each admin save makes two commits (saveMed + appendChangelog),
# which would otherwise trigger two parallel deploys that race and one fails.
# cancel-in-progress: false queues the second run so both changes land cleanly.
concurrency:
    group: deploy
    cancel-in-progress: false

jobs:
    deploy:
        name: Build & Deploy
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              env:
                  ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
              run: npm run build

            - name: Snapshot source HTML before deploy
              run: |
                  git show ${{ github.sha }}:index.html     > /tmp/index.html.src
                  git show ${{ github.sha }}:admin.html     > /tmp/admin.html.src
                  git show ${{ github.sha }}:changelog.html > /tmp/changelog.html.src

            - name: Deploy to main
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: main
                  folder: dist/
                  clean: false
                  commit-message: 'Deploy built assets [skip ci]'

            - name: Restore source HTML on main
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git fetch origin main
                  git reset --mixed origin/main
                  cp /tmp/index.html.src     index.html
                  cp /tmp/admin.html.src     admin.html
                  cp /tmp/changelog.html.src changelog.html
                  git add index.html admin.html changelog.html
                  git diff --cached --quiet && echo "HTML already in source form." || {
                    git commit -m "Restore source HTML entry points [skip ci]"
                    git -c credential.helper= \
                        -c http.https://github.com/.extraheader= \
                        push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
                  }

            - name: Wait for GitHub Pages to propagate
              run: sleep 60

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: ./node_modules/.bin/playwright install chromium

            - name: Install Playwright system deps
              run: ./node_modules/.bin/playwright install-deps chromium

            - name: Post-deploy smoke test (live URL)
              env:
                  PLAYWRIGHT_BASE_URL: https://rcwaters.github.io/LAIguide
              run: npx playwright test e2e/deploy-smoke.spec.ts --project=chromium
