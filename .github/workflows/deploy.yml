name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write

# One deploy at a time. Each admin save makes two commits (saveMed + appendChangelog),
# which would otherwise trigger two parallel deploys that race and one fails.
# cancel-in-progress: false queues the second run so both changes land cleanly.
concurrency:
    group: deploy
    cancel-in-progress: false

jobs:
    deploy:
        name: Build & Deploy
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              env:
                  ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
              run: npm run build

            - name: Deploy to main
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: main
                  folder: dist/
                  clean: false

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Post-deploy smoke test (live URL)
              continue-on-error: true
              env:
                  PLAYWRIGHT_BASE_URL: https://rcwaters.github.io/LAIguide
              run: npx playwright test e2e/deploy-smoke.spec.ts --project=chromium
