name: PR Preview (Surge)

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]

permissions:
    pull-requests: write

jobs:
    preview:
        name: Deploy PR Preview
        runs-on: ubuntu-latest
        env:
            PREVIEW_URL: laiguide-pr-${{ github.event.number }}.surge.sh

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              if: github.event.action != 'closed'
              run: npm ci

            - name: Build
              if: github.event.action != 'closed'
              run: npm run build

            - name: Deploy preview to Surge
              if: github.event.action != 'closed'
              run: npx surge dist/ $PREVIEW_URL --token ${{ secrets.SURGE_TOKEN }}

            - name: Comment preview URL on PR
              if: github.event.action != 'closed'
              uses: actions/github-script@v7
              with:
                  script: |
                      const url = `https://${process.env.PREVIEW_URL}`;
                      const body = `### 🔍 PR Preview\n\n**${url}**\n\nUpdated with the latest push.`;
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });
                      const existing = comments.find(c => c.body.includes('PR Preview'));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }

            - name: Tear down preview on PR close
              if: github.event.action == 'closed'
              run: npx surge teardown $PREVIEW_URL --token ${{ secrets.SURGE_TOKEN }}
