name: CI

on:
    push:
        branches: [main]
        # Skip CI for admin content-only saves (med JSON + changelog).
        # These trigger deploy.yml but don't need a full test run.
        paths-ignore:
            - 'src/meds/**'
            - 'src/data/changelog.json'
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm test

    e2e-tests:
        name: E2E Tests
        needs: unit-tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Cache Playwright browsers + system deps
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: |
                      ~/.cache/ms-playwright
                      /var/cache/apt
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: ./node_modules/.bin/playwright install chromium

            - name: Install Playwright system deps
              run: ./node_modules/.bin/playwright install-deps chromium

            - name: Run E2E tests
              run: npm run test:e2e

            - name: Run production smoke test
              run: |
                  npm run build

                  PORT=$(python3 - <<'PY'
                  import socket
                  s = socket.socket()
                  s.bind(("127.0.0.1", 0))
                  print(s.getsockname()[1])
                  s.close()
                  PY
                  )

                  npx vite preview --host 127.0.0.1 --port "$PORT" >/tmp/vite-preview.log 2>&1 &
                  PREVIEW_PID=$!
                  trap 'kill $PREVIEW_PID' EXIT

                  for i in {1..30}; do
                    if curl -fsS "http://127.0.0.1:$PORT" >/dev/null; then
                      break
                    fi
                    sleep 1
                  done

                  PLAYWRIGHT_BASE_URL="http://127.0.0.1:$PORT" \
                    npx playwright test e2e/deploy-smoke.spec.ts --project=chromium

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7
