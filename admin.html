<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Portal</title>
        <link
            rel="icon"
            id="favicon"
            type="image/png"
            href="./assets/logo-desc-DqcXQLlW.png"
        />
        <script>
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = c.height = 64;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#3c8476';
                ctx.fillRect(0, 0, 64, 64);
                ctx.drawImage(img, 0, 0, 64, 64);
                document.getElementById('favicon').href = c.toDataURL('image/png');
            };
            img.src = './media/logo-desc.png';
        </script>
      <script type="module" crossorigin src="./assets/admin-DNK1Du4t.js"></script>
      <link rel="modulepreload" crossorigin href="./assets/vivitrol-BZvl7Tg8.js">
      <link rel="modulepreload" crossorigin href="./assets/session-2nyAmeg4.js">
      <link rel="modulepreload" crossorigin href="./assets/constants-D_WzPCnM.js">
      <link rel="stylesheet" crossorigin href="./assets/session-CRMlyaGl.css">
      <link rel="stylesheet" crossorigin href="./assets/admin-Bok18QT5.css">
    </head>

    <body>
        <div class="admin-header">
            <h1>
                <img
                    src="./assets/logo-desc-DqcXQLlW.png"
                    alt="DESC logo"
                    class="admin-header-logo"
                />Admin Portal
            </h1>
        </div>

        <div class="admin-container">
            <!-- Login -->
            <div id="login-section">
                <label for="email-input">Email</label>
                <input type="email" id="email-input" autocomplete="email" />
                <label for="code-input">Access Code</label>
                <input type="password" id="code-input" autocomplete="off" />
                <button id="login-btn">Sign In</button>
                <div id="login-error"></div>
            </div>

            <!-- Editor (hidden until authenticated) -->
            <div id="editor-section">
                <div class="user-bar">
                    <span id="user-email"></span>
                    <div
                        style="
                            position: absolute;
                            left: 50%;
                            transform: translateX(-50%);
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            gap: 4px;
                        "
                    >
                        <a
                            href="./changelog.html"
                            style="
                                font-size: 13px;
                                color: #3c8476;
                                text-decoration: none;
                                white-space: nowrap;
                            "
                            >Change Log</a
                        >
                        <span id="top-status"></span>
                    </div>
                    <button id="logout-btn">Sign Out</button>
                </div>

                <div class="editor-toolbar">
                    <select id="med-select">
                        <option value="">Select a medication…</option>
                    </select>
                    <button id="save-btn">Save</button>
                    <button id="delete-btn">Delete</button>
                    <button id="toggle-json-btn" type="button">Raw JSON</button>
                </div>

                <!-- Structured form editor -->
                <div id="form-editor"></div>

                <!-- Raw JSON editor (hidden by default) -->
                <div id="json-section" style="display: none">
                    <textarea id="json-editor" spellcheck="false"></textarea>
                </div>

                <div id="deploy-status" style="margin-top: 8px; font-size: 13px; color: #555"></div>
            </div>
        </div>
        <p style="text-align: center; margin-top: 1rem">
            <a href="./index.html" style="color: #1a5c3a; text-decoration: none"
                >Back to Clinical Tool</a
            >
        </p>
    </body>
</html>
