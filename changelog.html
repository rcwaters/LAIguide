<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Change Log</title>
        <link rel="icon" id="favicon" type="image/png" href="./assets/logo-desc-DqcXQLlW-DqcXQLlW-DqcXQLlW-DqcXQLlW-DqcXQLlW-DqcXQLlW.png" />
        <script>
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = c.height = 64;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#3c8476';
                ctx.fillRect(0, 0, 64, 64);
                ctx.drawImage(img, 0, 0, 64, 64);
                document.getElementById('favicon').href = c.toDataURL('image/png');
            };
            img.src = './media/logo-desc.png';
        </script>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Domine:wght@400;500;600;700&display=swap');

            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Domine', Georgia, serif;
                background: #aecfcc;
                min-height: 100vh;
                padding: 20px;
            }

            .admin-header {
                background: #3c8476;
                max-width: 960px;
                margin: 0 auto;
                padding: 20px 16px;
                text-align: center;
            }

            .admin-header h1 {
                color: #000;
                font-size: clamp(24px, 5vw, 34px);
                font-weight: 700;
                letter-spacing: 0.02em;
            }

            .admin-header-logo {
                height: 36px;
                width: auto;
                vertical-align: middle;
                margin-right: 4px;
            }

            .admin-container {
                background: white;
                max-width: 960px;
                margin: 0 auto;
                padding: 24px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            }

            #changelog-status {
                font-size: 14px;
                color: #555;
                margin-bottom: 12px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 14px;
            }

            thead th {
                background: #3c8476;
                color: white;
                padding: 10px 12px;
                text-align: left;
                font-weight: 600;
            }

            tbody tr {
                border-bottom: 1px solid #e0e0e0;
            }

            tbody tr:hover {
                background: #f5faf9;
            }

            tbody td {
                padding: 9px 12px;
                vertical-align: top;
            }

            .row-delete {
                background: #fff5f5;
            }

            .row-delete:hover {
                background: #ffecec;
            }

            .action-badge {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 12px;
                font-weight: 600;
            }

            .action-update {
                background: #d4edda;
                color: #2d6a4f;
            }

            .action-delete {
                background: #f8d7da;
                color: #842029;
            }

            .med-key {
                font-family: 'Consolas', 'Courier New', monospace;
                font-size: 12px;
                color: #555;
            }
        </style>
        <style>
            .action-badge.action-update[data-expandable] {
                cursor: pointer;
                text-decoration: underline dotted;
            }
            .changelog-details {
                display: none;
                background: #f0f7f4;
            }
            .changelog-details.open {
                display: table-row;
            }
            .changelog-details td {
                padding: 6px 16px 10px;
                font-size: 12px;
                color: #2d6a4f;
            }
            .changelog-details ul {
                margin: 4px 0 0 16px;
                padding: 0;
            }
            .changelog-details li {
                font-family: 'Consolas', 'Courier New', monospace;
                font-size: 11px;
                color: #444;
                margin-bottom: 3px;
            }
            .change-path {
                font-weight: 600;
                color: #2d6a4f;
            }
            .change-from {
                color: #842029;
                text-decoration: line-through;
            }
            .change-to {
                color: #2d6a4f;
                font-weight: 600;
            }
            .action-restore {
                background: #dbeafe;
                color: #1e40af;
            }
            .th-hint {
                font-weight: normal;
                color: #fff;
                font-size: 10px;
                position: absolute;
                left: 0;
                right: 0;
                bottom: 2px;
                text-align: center;
            }
            th:has(.th-hint) {
                text-align: center;
                position: relative;
            }
            .restore-bar {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 0 14px;
                flex-wrap: wrap;
            }
            .restore-label {
                font-size: 13px;
                color: #444;
            }
            .restore-select {
                padding: 4px 8px;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-size: 13px;
                min-width: 280px;
            }
            .restore-btn {
                padding: 5px 14px;
                background: #1e40af;
                color: #fff;
                border: none;
                border-radius: 4px;
                font-size: 13px;
                cursor: pointer;
            }
            .restore-btn:disabled {
                opacity: 0.6;
                cursor: default;
            }
        </style>
        <script type="module" src="./src/admin/changelog.ts"></script>
    </head>

    <body>
        <div class="admin-header">
            <h1><img src="./assets/logo-desc-DqcXQLlW-DqcXQLlW-DqcXQLlW-DqcXQLlW-DqcXQLlW-DqcXQLlW.png" alt="DESC logo" class="admin-header-logo" />Change Log</h1>
        </div>

        <div class="admin-container">
            <div id="restore-bar" style="display:none;" class="restore-bar">
                <span class="restore-label">Restore all meds to a point in time:</span>
                <select id="restore-time" class="restore-select">
                    <option value="">Select a save point…</option>
                </select>
                <button id="restore-btn" class="restore-btn">Restore</button>
            </div>
            <div id="changelog-status">Loading…</div>
            <table>
                <thead>
                    <tr>
                        <th>Date / Time</th>
                        <th>Email</th>
                        <th>Action<small class="th-hint">(click to expand)</small></th>
                        <th>Medication</th>
                    </tr>
                </thead>
                <tbody id="changelog-tbody"></tbody>
            </table>
        </div>

        <p style="text-align: center; margin-top: 1rem">
            <a href="./admin.html" style="color: #1a5c3a; text-decoration: none">Back to Admin Portal</a>
        </p>
    </body>
</html>
