<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Change Log</title>
        <link
            rel="icon"
            id="favicon"
            type="image/png"
            href="./assets/logo-desc-DqcXQLlW.png"
        />
        <script>
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = c.height = 64;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#3c8476';
                ctx.fillRect(0, 0, 64, 64);
                ctx.drawImage(img, 0, 0, 64, 64);
                document.getElementById('favicon').href = c.toDataURL('image/png');
            };
            img.src = './media/logo-desc.png';
        </script>
      <script type="module" crossorigin src="./assets/changelog-DEQ3puj8.js"></script>
      <link rel="modulepreload" crossorigin href="./assets/vivitrol-BZvl7Tg8.js">
      <link rel="modulepreload" crossorigin href="./assets/session-2nyAmeg4.js">
      <link rel="stylesheet" crossorigin href="./assets/session-CRMlyaGl.css">
      <link rel="stylesheet" crossorigin href="./assets/changelog-f1e_m4Ep.css">
    </head>

    <body>
        <div class="admin-header">
            <h1>
                <img
                    src="./assets/logo-desc-DqcXQLlW.png"
                    alt="DESC logo"
                    class="admin-header-logo"
                />Change Log
            </h1>
        </div>

        <div class="admin-container">
            <div id="restore-bar" style="display: none" class="restore-bar">
                <span class="restore-label">Restore all meds to a point in time:</span>
                <select id="restore-time" class="restore-select">
                    <option value="">Select a save point…</option>
                </select>
                <button id="restore-btn" class="restore-btn">Restore</button>
            </div>
            <div id="changelog-status">Loading…</div>
            <table>
                <thead>
                    <tr>
                        <th>Date / Time</th>
                        <th>Email</th>
                        <th>Action<small class="th-hint">(click to expand)</small></th>
                        <th>Medication</th>
                    </tr>
                </thead>
                <tbody id="changelog-tbody"></tbody>
            </table>
        </div>

        <p style="text-align: center; margin-top: 1rem">
            <a href="./admin.html" style="color: #1a5c3a; text-decoration: none"
                >Back to Admin Portal</a
            >
        </p>
    </body>
</html>
